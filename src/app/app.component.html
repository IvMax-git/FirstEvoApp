<h1>{{ title }}</h1>
<h2>Дата: {{ currentDate | date:'dd/MM/yyyy' }}</h2>
<h2>Число {{ myNumber }} + 5 = {{ myNumber | string_pipe }}</h2>
<h2>Список товаров:</h2>
<ul>
  <li *ngFor="let item of items">
    <strong>{{ item.name }}</strong> - Цена: {{ item.price }} руб. (ID: {{ item.id }})
  </li>
</ul>
